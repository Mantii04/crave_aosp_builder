name: Crave Builder(self-hosted)

on:
  workflow_dispatch:
    inputs:
      BASE_PROJECT:
        description: 'Choose a base project:'
        required: true
        default: 'LineageOS 21.0'
        type: choice
        options:
          - 'LineageOS 20.0'
          - 'LineageOS 21.0'
          - 'LineageOS 22.1'
          - 'ArrowOS 13.1'
          - 'DerpFest 14.0'
          - 'CipherOS 14'
          - 'PixelOS 15'
          - 'RisingOS 15 Revived'
          - 'LineageOS 18.1'
          - 'LineageOS 16.0'
          - 'CyanogenMOD 14.1'
          - 'AOSP'

      BUILD_DIFFERENT_ROM:
        description: "Command to initialize a different repo project"
        required: false
        default: "echo 'Build Starting!'"

      LOCAL_MANIFEST:
        description: "Local manifest repo or raw xml"
        required: true
        default: "https://github.com/sounddrill31/local_manifests_oxygen"

      DEVICE_NAME:
        required: true
        default: "oxygen"

      PRODUCT_NAME:
        required: true
        default: "oxygen"

      BUILD_COMMAND:
        required: true
        default: "mka bacon"

      BUILD_TYPE:
        required: true
        default: "userdebug"
        type: choice
        options: ["eng", "userdebug", "user"]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      PROJECTFOLDER: ${{ steps.vars.outputs.PROJECTFOLDER }}
      REPO_INIT: ${{ steps.vars.outputs.REPO_INIT }}
      LUNCH: ${{ steps.vars.outputs.LUNCH }}

    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        shell: bash
        run: |
          case "${{ github.event.inputs.BASE_PROJECT }}" in
            "LineageOS 21.0")
              echo "PROJECTFOLDER=/crave-devspaces/Lineage21" >> $GITHUB_OUTPUT
              echo "REPO_INIT=repo init -u https://github.com/LineageOS/android.git -b lineage-21.0 --depth=1" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "PROJECTFOLDER=/crave-devspaces/default" >> $GITHUB_OUTPUT
              echo "REPO_INIT=repo init -u https://android.googlesource.com/platform/manifest.git -b master --depth=1" >> $GITHUB_OUTPUT
              ;;
          esac

          echo "LUNCH=lunch ${{ github.event.inputs.PRODUCT_NAME }}-${{ github.event.inputs.BUILD_TYPE }}" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Setup repo
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Test manifest
        shell: bash
        run: |
          rm -rf tester
          mkdir tester
          cd tester

          ${{ needs.prepare.outputs.REPO_INIT }}

          bash -c "${{ github.event.inputs.BUILD_DIFFERENT_ROM }}"

          echo "Local manifest test OK"

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build placeholder
        run: |
          echo "Build stage reached"
          echo "This is where Crave runs"