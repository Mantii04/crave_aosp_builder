name: Crave Builder Test (Safe)

on:
  workflow_dispatch:
    inputs:
      BASE_PROJECT:
        description: "Base project"
        required: true
        default: "LineageOS 21.0"
      DEVICE_NAME:
        description: "Device codename"
        required: true
        default: "oxygen"

jobs:
  test-crave:
    name: Test Crave Installation + Connection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq tmux

      - name: Install Crave (original method)
        run: |
          echo "Installing Crave..."

          mkdir -p $HOME/bin

          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --

          if [ ! -f "${PWD}/crave" ]; then
            echo "Crave binary not found after install"
            ls -la
            exit 1
          fi

          mv ${PWD}/crave $HOME/bin/
          chmod +x $HOME/bin/crave

          sudo ln -sf $HOME/bin/crave /usr/bin/crave

      - name: Verify Crave install
        run: |
          which crave
          crave --version || true

      - name: Create minimal config (required for auth)
        run: |
          echo "Creating minimal crave.conf..."

          cat > crave.conf <<EOF
          username=${CRAVE_USERNAME}
          token=${CRAVE_TOKEN}
          EOF

        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}

      - name: Test Crave connection
        run: |
          echo "Testing crave CLI..."

          crave clone list || echo "Clone list failed (may still be OK)"

      - name: Simple command test inside devspace
        run: |
          echo "Running lightweight test..."

          timeout 30s crave devspace -- "echo 'Crave connection successful' || true"
        continue-on-error: true