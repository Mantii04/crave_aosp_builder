name: Crave Devspace Connection Test

on:
  workflow_dispatch:
    inputs:
      BASE_PROJECT:
        description: "Base project (test only)"
        required: true
        default: "LineageOS 21.0"

jobs:
  test:
    name: Test Real Crave Devspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq tmux

      - name: Install Crave (original method)
        run: |
          echo "Installing Crave..."

          mkdir -p $HOME/bin

          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --

          if [ ! -f "${PWD}/crave" ]; then
            echo "Crave install failed"
            ls -la
            exit 1
          fi

          mv ${PWD}/crave $HOME/bin/
          chmod +x $HOME/bin/crave

          sudo ln -sf $HOME/bin/crave /usr/bin/crave

      - name: Verify Crave
        run: |
          which crave
          crave --version || true

      - name: Create Crave config (AUTH)
        run: |
          cat > crave.conf <<EOF
          username=${CRAVE_USERNAME}
          token=${CRAVE_TOKEN}
          EOF
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}

      - name: Start REAL Devspace test
        run: |
          echo "Starting devspace test..."

          crave devspace -- "
            echo '--- INSIDE DEVSPACE ---' &&
            whoami &&
            pwd &&
            echo 'Crave devspace is working' &&
            touch test_success.txt &&
            ls -la
          " || echo "Devspace failed or not available"