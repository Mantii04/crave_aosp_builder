name: Crave Builder Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git jq

      - name: Setup crave
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          mkdir -p $HOME/bin
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv ./crave $HOME/bin/
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Verify crave
        run: |
          crave --version || true
          echo "Crave installed"

      - name: Test local manifest clone only
        run: |
          mkdir test
          cd test
          git clone https://github.com/sounddrill31/local_manifests_oxygen .repo/local_manifests || true
          ls -la .repo/local_manifests || true
