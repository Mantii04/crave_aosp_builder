name: Crave Connection Test

on:
  workflow_dispatch:

jobs:
  test-crave:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git jq

      - name: Install Crave
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          mkdir -p $HOME/bin
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv ./crave $HOME/bin/
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Verify Crave install
        run: |
          crave --version

      - name: Test Crave Authentication
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}
        run: |
          echo "Testing login (no build)..."
          crave login || echo "Login step finished (check output above)"

      - name: Test Crave Devspace Connection
        env:
          CRAVE_FLAGS: ${{ secrets.CRAVE_FLAGS }}
        run: |
          echo "Testing devspace connection..."
          crave $CRAVE_FLAGS devspace -- "echo 'CRAVE CONNECTION OK' && uname -a"

      - name: Final check
        run: |
          echo "If you see this, Crave connection test passed"