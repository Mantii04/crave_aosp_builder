name: Crave Builder Test (Connection Only)

on:
  workflow_dispatch:
    inputs:
      BASE_PROJECT:
        description: "Base project"
        required: true
        default: "LineageOS 21.0"
      DEVICE_NAME:
        description: "Device codename"
        required: true
        default: "oxygen"

jobs:
  prepare:
    name: Setup Crave
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq tmux

      - name: Install Crave (original method)
        run: |
          echo "Installing Crave..."

          mkdir -p $HOME/bin

          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --

          if [ ! -f "${PWD}/crave" ]; then
            echo "Crave binary missing after install"
            ls -la
            exit 1
          fi

          mv ${PWD}/crave $HOME/bin/
          chmod +x $HOME/bin/crave

          sudo ln -sf $HOME/bin/crave /usr/bin/crave

      - name: Verify Crave
        run: |
          which crave || exit 1
          crave --version || true

      - name: Create minimal config
        run: |
          cat > crave.conf <<EOF
          username=${CRAVE_USERNAME}
          token=${CRAVE_TOKEN}
          EOF
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}

      - name: Test Crave connection (SAFE)
        run: |
          echo "=== Testing Crave Connection ==="

          crave clone list || echo "Clone list not available (ok)"

          timeout 30s crave devspace -- "echo CONNECTION_OK" || echo "Devspace not active"

          echo "=== TEST COMPLETE ==="